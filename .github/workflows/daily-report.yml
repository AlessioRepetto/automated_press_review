# =============================================================================
# Analisi News — scheduled daily report
#
# Runs the full pipeline twice a day on a GitHub-hosted CPU runner and
# publishes the HTML report to the GitHub Pages repo. No local artifacts
# are written (run_report is invoked WITHOUT --save-local), so the job is
# safe on an ephemeral runner with no persistent disk.
#
# Secrets required (repo Settings -> Secrets and variables -> Actions):
#   MISTRAL_API_KEY   the Mistral API key
#   GH_PUBLISH_TOKEN  fine-grained PAT with 'Contents: write' on the
#                     Pages repo (AlessioRepetto/la_parola_data)
#
# NOTE on the token name: the secret is called GH_PUBLISH_TOKEN, not
# GITHUB_TOKEN — GitHub forbids user secrets whose name starts with
# "GITHUB_". The workflow maps it to the GITHUB_TOKEN environment
# variable that config.py expects (see the 'env:' block of the run step).
# =============================================================================

name: Daily report

on:
  # Twice a day. Cron is in UTC. 06:00 and 18:00 UTC correspond to roughly
  # 07:00/08:00 and 19:00/20:00 Italian time, depending on daylight saving.
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
    - cron: "0 16 * * *"
  # Lets you trigger a run by hand from the Actions tab (useful for testing).
  workflow_dispatch:

# The job only reads this repo's code; it publishes elsewhere via the PAT.
permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # Generous ceiling; a CPU run with API retries stays well under this.
    timeout-minutes: 90

    steps:
      # 1. Get the project code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 3.13 — matches the pinned environment in requirements
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          # Caches the pip downloads keyed on the cloud requirements file,
          # so dependency install is fast after the first run.
          cache: "pip"
          cache-dependency-path: "requirements-cloud.txt"

      # 3. Install dependencies (CPU build of torch).
      #    The PyTorch CPU index is added so the plain torch==2.9.1
      #    resolves to the CPU wheel.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cloud.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      # 4. spaCy Italian model — installed as a wheel, not on PyPI
      - name: Install spaCy Italian model
        run: |
          pip install https://github.com/explosion/spacy-models/releases/download/it_core_news_lg-3.8.0/it_core_news_lg-3.8.0-py3-none-any.whl

      # 5. NLTK data — the pipeline uses the Italian stopwords corpus
      - name: Download NLTK data
        run: |
          python -m nltk.downloader stopwords

      # 6. Run the pipeline and publish.
      #    No --save-local: nothing is written to the runner's disk.
      #    Secrets are injected as environment variables; config.py reads
      #    them via os.getenv exactly as it does locally from the .env.
      - name: Generate and publish report
        env:
          # --- Secrets (set in repo Settings -> Secrets and variables) ----
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
          # --- Non-sensitive config, taken from your local .env ----------
          CSV_FILE: "sources/news_feeds.csv"
          MAIN_SECTION_NAME: "Prima Pagina"
          REQUEST_TIMEOUT: "15"
          USER_AGENT: "AnalisiNewsBot/1.0 (+https://example.com)"
          TZ_ROME: "Europe/Rome"
          # --- Mistral model + GitHub publishing target ------------------
          #     (not in your .env — these were config.py defaults; made
          #     explicit here so they live in one visible place)
          MISTRAL_MODEL: "mistral-large-latest"
          GITHUB_OWNER: "AlessioRepetto"
          GITHUB_REPO: "la_parola_data"
          GITHUB_BRANCH: "main"
          GITHUB_TARGET_PATH: "index.html"
        run: |
          python -m report.run_report --verbose
